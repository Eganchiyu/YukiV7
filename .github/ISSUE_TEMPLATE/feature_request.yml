name: "特性申请 (Feature Request)"
description: "为项目提出新的功能想法或改进建议"
title: "[Feature Request]: " # 自动为用户的 Issue 标题添加前缀
labels: ["enhancement", "triage"] # 用户提交后，自动打上这些标签

body:
  - type: markdown
    attributes:
      value: |
        ### 感谢您为项目贡献想法！
        请认真填写以下表单，详细的描述能帮助我更快地评估并实现该功能。

  - type: textarea
    id: problem-description
    attributes:
      label: "您对项目的新需求是什么？"
      description: "请详细描述您遇到的问题或期望的功能场景。"
      placeholder: "例如：当前流程中哪些步骤效率低下？有哪些业务需求无法被现有功能满足？"
    validations:
      required: true # 设置为必填项

  - type: textarea
    id: proposed-solution
    attributes:
      label: "期望的解决方案"
      description: "您希望这个新功能如何工作？"
      placeholder: "例如：希望增加更透明的debug日志，方便调试和定位问题。"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "您认为该需求的紧急程度"
      options:
        - "P0 - 阻塞业务（急需）"
        - "P1 - 提升体验（期望）"
        - "P2 - 长期规划（建议）"
    validations:
      required: true

  - type: checkboxes
    id: prerequisites
    attributes:
      label: "提交前确认"
      options:
        - label: "我已经搜索过现有的 Issue，确认没有重复的提案。"
          required: true
        - label: "我愿意在社区的指导下参与该特性的代码开发（PR）。"
          required: false